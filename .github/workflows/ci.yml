name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Lint ─────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff==0.4.4

      - name: Check style (ruff)
        run: ruff check src/ web/backend/

      - name: Check formatting (ruff)
        run: ruff format --check src/ web/backend/

  # ── Job 2: Test ─────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      # Placeholder values — CI never calls real APIs.
      # POLICY: do NOT replace these with real keys in YAML or GitHub Secrets.
      # Real API keys would cause live (costly) calls on every PR.
      LLM_API_KEY: ci-placeholder-not-real
      LLM_BASE_URL: https://api.openai.com/v1
      LLM_MODEL: gpt-4
      PUBMED_EMAIL: ci@example.com
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-web.txt

      - name: Install dependencies (CPU-only torch for CI speed)
        run: |
          pip install -r requirements.txt -r requirements-web.txt \
            --extra-index-url https://download.pytorch.org/whl/cpu

      - name: Run tests
        # Exit code 5 = "no tests collected" — treat as pass until tests are added.
        # Real failures (exit code 1) still fail CI.
        run: |
          pytest tests/ --tb=short -q
          STATUS=$?
          [ $STATUS -eq 5 ] && exit 0 || exit $STATUS
        shell: bash

  # ── Job 3: Docker Build ─────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.backend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
